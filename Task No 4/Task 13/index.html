<!DOCTYPE html>
<html>
    <head>
        <title> Task 13 </title>
        <style>
            body { font-family: Arial; text-align: center; }
            #commentsList { margin-top: 20px; list-style-type: none; padding: 0; }
            #commentsList li { background-color: lightyellow; margin: 5px 0; padding: 8px; border-radius: 4px; }
            input { padding: 6px; width: 250px; }
            button { padding: 6px 12px; margin-left: 5px; cursor: pointer; }
        </style>
    </head>
    <body>
        <h2>Comment System</h2>
        <input type="text" id="commentInput" placeholder="Write a comment">
        <button onclick="submitComment()">Submit</button>
        <ul id="commentsList"></ul>
        <script>
            let comments = [];
            function displayComments() {
                let list = document.getElementById("commentsList");
                list.innerHTML = ""; 
                if(comments.length === 0) {
                    let li = document.createElement("li");
                    li.innerText = "No Comments In the Array";
                    list.appendChild(li);
                    return;
                }
                let start = comments.length - 5 >= 0 ? comments.length - 5 : 0;
                let latestComments = comments.slice(start).reverse();
                for(let i = 0; i < latestComments.length; i++) {
                    let li = document.createElement("li");
                    li.innerText = latestComments[i];
                    list.appendChild(li);
                }
            }
            function submitComment() {
                let input = document.getElementById("commentInput");
                let comment = input.value.trim();
                if(comment === "") return;
                comments.push(comment); 
                input.value = ""; 
                displayComments(); 
            }
            displayComments();
        </script>
    </body>
</html>
