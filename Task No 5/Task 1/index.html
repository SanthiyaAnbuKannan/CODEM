<!DOCTYPE html>
<html>
    <head>
        <title> Task 1 </title>
    </head>
    <body>
        <script>
            function calculateSum(a, b) {
                return a + b;
            }
            function calculateProduct(a, b) {
                return a * b;
            }
            let sumResult = calculateSum(5, 3);
            let productResult = calculateProduct(4, 6);
            console.log("Sum: ", sumResult);
            console.log("Product: ", productResult);
        </script>
    </body>
</html>
