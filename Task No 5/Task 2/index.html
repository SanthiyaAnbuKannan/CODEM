<!DOCTYPE html>
<html>

        <title> Task 2 </title>
    </head>
    <body>
        <script>
            let getLength = function(str) {
                return str.length;
            };
            let squareNumber = (num) => {
                return num * num;
            };
            let lengthResult = getLength("Santhiya");
            let squareResult = squareNumber(5);
            console.log("Length of the string:", lengthResult);
            console.log("Square of the number:", squareResult);
        </script>
    </body>
</html>
